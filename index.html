<!DOCTYPE html> <!-- 이 문서가 HTML5 버전으로 작성되었다는 것을 알려줍니다. -->
<html lang="ko"> <!-- 문서의 기본 언어가 한국어(ko)임을 설정합니다. -->
<head> <!-- 눈에 보이지 않는 설정 정보들을 담는 부분입니다. -->
    <meta charset="UTF-8"> <!-- 글자가 깨지지 않도록 UTF-8 방식으로 문자를 읽도록 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 화면에서도 크기가 잘 맞도록 설정합니다. -->
    <title>일일 퀘스트 생성기</title> <!-- 웹 브라우저 탭에 표시될 제목입니다. -->
    <link rel="stylesheet" href="style.css"> <!-- 예쁘게 꾸미기 위해 style.css 파일을 불러옵니다. -->
    <!-- 깔끔한 무료 글꼴(폰트)인 Noto Sans KR을 인터넷(구글)에서 불러옵니다. -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"> 
</head> <!-- 헤드(설정) 부분의 끝입니다. -->
<body> <!-- 실제 화면에 보여질 내용이 들어가는 부분입니다. -->
    <div class="container"> <!-- 전체 내용을 가운데로 모아주기 위한 큰 상자입니다. -->
        <header> <!-- 웹페이지의 머리말(제목 부분)입니다. -->
            <h1>✨ 일일 퀘스트 생성기</h1> <!-- 가장 큰 제목 글씨입니다. -->
            <p>오늘 하루를 게임처럼! 당신의 목표를 입력하고 퀘스트를 받으세요.</p> <!-- 제목 밑에 들어갈 설명 글입니다. -->
        </header> <!-- 머리말 상자의 끝입니다. -->

        <main> <!-- 웹페이지의 몸통(주요 내용)입니다. -->
            <div class="input-section"> <!-- 입력칸과 버튼을 묶어두는 상자입니다. -->
                <!-- 글씨를 입력할 수 있는 빈 칸입니다. 사용자가 무엇을 적을지 안내문구(placeholder)도 넣었습니다. -->
                <input type="text" id="goalInput" placeholder="어떤 목표를 이루고 싶나요? (예: 건강, 다이어트, 코딩 공부)"> 
                <!-- 클릭할 수 있는 버튼입니다. id는 자바스크립트에서 이 버튼을 찾을 때 쓰는 이름표입니다. -->
                <button id="generateBtn">퀘스트 생성 ⚔️</button> 
            </div> <!-- 입력 상자의 끝입니다. -->

            <div id="loading" class="hidden"> <!-- 내용을 불러올 때 보여줄 로딩 화면입니다. 처음에는 숨겨둡니다(hidden). -->
                <div class="spinner"></div> <!-- 빙글빙글 도는 로딩 그림을 만들기 위한 빈 상자입니다. (디자인은 CSS에서 합니다) -->
                <p>신전에서 퀘스트를 가져오는 중...</p> <!-- 로딩 중에 보여줄 안내 글씨입니다. -->
            </div> <!-- 로딩 화면 상자의 끝입니다. -->

            <div id="questContainer" class="quest-container"> <!-- 만들어진 퀘스트 카드들이 나란히 놓일 큰 상자입니다. -->
                <!-- (자바스크립트가 여기에 퀘스트 카드 내용들을 자동으로 만들어 넣을 겁니다.) -->
            </div> <!-- 퀘스트 상자의 끝입니다. -->
        </main> <!-- 몸통 부분의 끝입니다. -->
    </div> <!-- 전체 상자의 끝입니다. -->

    <script src="script.js"></script> <!-- 웹페이지에 생명을 불어넣을 자바스크립트 파일을 불러옵니다. -->
</body> <!-- 바디 부분의 끝입니다. -->
</html> <!-- HTML 문서의 끝입니다. -->
